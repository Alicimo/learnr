<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>learnr</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <h1>learnr</h1>
      </div>
    </header>

    <section class="dashboard" aria-label="Deck overview">
      <div class="dashboard-header">
        <div>
          <h2>Today</h2>
          <p id="dashboardStatus">Loading deck summary...</p>
        </div>
        <label class="session-limit-control">
          Session size
          <input id="sessionLimit" type="number" min="1" max="200" value="10" aria-label="Session size">
        </label>
      </div>

      <div class="summary-grid" aria-label="Today summary">
        <div class="summary-item">
          <span class="summary-value" id="totalDueReviews">0</span>
          <span class="summary-label">due reviews</span>
        </div>
        <div class="summary-item">
          <span class="summary-value" id="totalNewCards">0</span>
          <span class="summary-label">new cards</span>
        </div>
        <div class="summary-item">
          <span class="summary-value" id="totalCards">0</span>
          <span class="summary-label">cards</span>
        </div>
      </div>

      <div class="deck-list-header">
        <h2>Decks</h2>
        <button id="startAllSession" type="button">Start Review</button>
      </div>
      <div id="deckList" class="deck-list"></div>
      <div class="deck-import-action">
        <button class="secondary-button" id="openImportDialog" type="button">Import Deck</button>
      </div>
    </section>

    <section class="progress-wrap" aria-label="Session progress">
      <div class="progress-meta">
        <span id="progressText">0 / 0</span>
        <span id="statusText">Import cards to begin.</span>
      </div>
      <div class="progress-track">
        <div id="progressBar" class="progress-bar"></div>
      </div>
    </section>

    <section class="study-layout">
      <div class="canvas-wrap">
        <div class="session-ready-card" id="sessionReadyCard" role="button" tabindex="0">
          <div>
            <h2>Ready</h2>
            <p><span id="readyCardCount">0 cards</span> queued.</p>
            <p>Tap, click, or press Space to begin.</p>
          </div>
        </div>
        <canvas id="swipeCanvas" aria-label="Swipe review card"></canvas>
      </div>
      <aside class="review-panel">
        <dl>
          <div>
            <dt>Direction</dt>
            <dd id="directionText">-</dd>
          </div>
          <div>
            <dt>Reviews</dt>
            <dd id="reviewCountText">-</dd>
          </div>
          <div>
            <dt>Tags</dt>
            <dd id="tagsText">-</dd>
          </div>
        </dl>
      </aside>
    </section>
  </main>

  <dialog id="importDialog" aria-labelledby="importDialogTitle" aria-describedby="importDialogHelp">
    <form id="importForm" class="import-form" method="dialog">
      <div class="modal-header">
        <div>
          <h2 id="importDialogTitle">Import deck</h2>
          <p id="importDialogHelp">Choose a CSV file with front/back columns. A deck column is optional.</p>
        </div>
        <button class="secondary-button icon-button" id="closeImportDialog" type="button" aria-label="Close import dialog">x</button>
      </div>
      <label>
        CSV file
        <input id="csvFile" name="file" type="file" accept=".csv,text/csv">
      </label>
      <label>
        Deck name
        <input id="deckName" name="deck_name" type="text" placeholder="Optional">
      </label>
      <p id="importError" class="form-error" role="alert"></p>
      <div class="modal-actions">
        <button class="secondary-button" id="cancelImport" type="button">Cancel</button>
        <button id="confirmImport" type="submit">Import deck</button>
      </div>
    </form>
  </dialog>
  <script type="module" src="/static/app.js"></script>
</body>
</html>
